<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uzbekistan World Cup</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    background: url("images/stadium.jpg") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero h1 {
    font-size: 50px;
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 10px;
}

/* SECTION */
.section {
    padding: 50px;
    text-align: center;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: #151c2e;
    padding: 15px;
    border-radius: 10px;
}

.card img {
    width: 100%;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Uzbekistan Road to the World Cup 🇺🇿⚽</h1>
</div>

<div class="section">
    <h2>About the Team</h2>
    <p>Uzbekistan national team competing in the World Cup journey with pride and strength.</p>
</div>

<div class="section">
    <h2>Players</h2>

    <div class="cards">
        <div class="card">
            <img src="images/player1.jpg">
            <h3>Player 1</h3>
        </div>

        <div class="card">
            <img src="images/player2.jpg">
            <h3>Player 2</h3>
        </div>

        <div class="card">
            <img src="images/player3.jpg">
            <h3>Player 3</h3>
        </div>
    </div>
</div>

</body>
</html>
